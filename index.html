<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battesimo di Camilla</title>

  <!-- Tag Meta per l'anteprima su WhatsApp -->
  <meta property="og:title" content="Battesimo di Camilla 🌸">
  <meta property="og:description" content="Sei invitato/a a celebrare questo giorno speciale con noi!">
  <meta property="og:image" content="invito.png">
  <meta property="og:type" content="website">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #f4ece8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    .card-container {
      position: relative;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      border-radius: 12px;
      overflow: hidden;
      background-color: #fff;
    }
    .card-image {
      width: 100%;
      display: block;
      height: auto;
    }

    /* Hotspot trasparente e interattivo posizionato sopra l'immagine */
    .link-area {
      position: absolute;
      cursor: pointer;
      border-radius: 50px;
      transition: transform 0.15s ease, background-color 0.15s ease;
    }
    .link-area:active {
      transform: scale(0.96);
      background-color: rgba(255, 255, 255, 0.2);
    }

    /* Posizionamento relativo alla grafica originale */
    .btn-chiesa { top: 76.5%; left: 18%; width: 23%; height: 8%; }
    .btn-ristorante { top: 76.5%; left: 43%; width: 23%; height: 8%; }
    .btn-regalo { top: 76.5%; left: 68%; width: 23%; height: 8%; }
    
    .btn-si { top: 93.2%; left: 15%; width: 33%; height: 4.2%; }
    .btn-no { top: 93.2%; left: 51%; width: 34%; height: 4.2%; }

    /* Finestra Pop-up IBAN (Modal) */
    .modal {
      display: none;
      position: fixed;
      z-index: 10;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .modal-content {
      background: #ffffff;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-content h3 { color: #8e505a; margin-bottom: 10px; }
    .modal-content p { color: #555; font-size: 0.95rem; margin-bottom: 15px; line-height: 1.4; }
    .iban-box {
      background: #fdf5f5;
      border: 1px dashed #d19ba3;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
      letter-spacing: 1px;
      font-size: 0.88rem;
      color: #333;
      word-break: break-all;
      margin-bottom: 15px;
    }
    .btn-close {
      background: #8e505a;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="card-container">
    <!-- Immagine dell'invito -->
    <img src="invito.png" alt="Invito Battesimo Camilla" class="card-image">

    <!-- Aree Cliccabili -->
    <a href="https://www.google.com/maps/search/?api=1&query=Chiesa+di+Sant%27Alessandro+Pieve+Emanuele" 
       target="_blank" class="link-area btn-chiesa" title="Chiesa"></a>

    <a href="https://www.google.com/maps/search/?api=1&query=Cascina+Quartiago+Bascape" 
       target="_blank" class="link-area btn-ristorante" title="Ristorante"></a>

    <div onclick="openModal()" class="link-area btn-regalo" title="Pensiero per Camilla"></div>

    <!-- Pulsanti Risposta WhatsApp (Sostituisci 393331234567 con il tuo numero) -->
    <a href="https://wa.me/393331234567?text=Parteciper%C3%B2%20con%20gioia%20al%20battesimo%20di%20Camilla!" 
       target="_blank" class="link-area btn-si" title="Sì, parteciperò"></a>

    <a href="https://wa.me/393331234567?text=Mi%20dispiace,%20non%20riuscir%C3%B2%20a%20partecipare%20al%20battesimo%20di%20Camilla." 
       target="_blank" class="link-area btn-no" title="Mi dispiace, non potrò"></a>
  </div>

  <!-- Pop-up Modal Regalo IBAN -->
  <div id="ibanModal" class="modal">
    <div class="modal-content">
      <h3>Un pensiero per Camilla 🌸</h3>
      <p>La vostra presenza è il dono più bello per noi, ma se volete farle un piccolo pensiero per il suo futuro:</p>
      <div class="iban-box">
        IT 00 X 00000 00000 000000000000
      </div>
      <p style="font-size: 0.8rem; color: #777;">Intestato a: Genitori di Camilla</p>
      <button class="btn-close" onclick="closeModal()">Chiudi</button>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById('ibanModal').style.display = 'flex';
    }
    function closeModal() {
      document.getElementById('ibanModal').style.display = 'none';
    }
    // Chiudi il popup se si clicca fuori dalla finestra
    window.onclick = function(event) {
      const modal = document.getElementById('ibanModal');
      if (event.target == modal) {
        modal.style.display = "none";
      }
    }
  </script>

</body>
</html>
